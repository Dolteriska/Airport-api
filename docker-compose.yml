
services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    env_file:
      - .env
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - dev-static-data:/app/vol/web/static
      - dev-media-data:/app/vol/web/media
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
  dev-static-data:
  dev-media-data:
